<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- SEO Meta Tags -->
    <meta name="title" content="urloft.site - Shorten, Share, and Track Your Links" />
    <meta
      name="description"
      content="Free link management platform. Create short URLs, organize with categories, track analytics, and earn badges."
    />
    <meta name="keywords" content="link shortener, URL shortener, link management, analytics, short links" />
    <meta name="author" content="urloft.site" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="urloft.site - Shorten, Share, and Track Your Links" />
    <meta
      property="og:description"
      content="Free link management platform. Create short URLs, organize with categories, track analytics, and earn badges."
    />
    <meta property="og:image" content="%sveltekit.assets%/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="urloft.site - Shorten, Share, and Track Your Links" />
    <meta
      property="twitter:description"
      content="Free link management platform. Create short URLs, organize with categories, track analytics, and earn badges."
    />
    <meta property="twitter:image" content="%sveltekit.assets%/twitter-image.png" />
    
    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
