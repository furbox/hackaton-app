name: Build Clean Production Branch

on:
  push:
    branches:
      - main

jobs:
  build-clean-prod:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Prepare clean prod branch
        run: |
          # 1. Crear carpeta temporal
          mkdir -p /tmp/prod-clean
          
          # 2. Copiar SOLO las 3 carpetas permitidas
          cp -r backend /tmp/prod-clean/ 2>/dev/null || true
          cp -r frontend-bun-ejs /tmp/prod-clean/ 2>/dev/null || true
          cp -r server /tmp/prod-clean/ 2>/dev/null || true
          
          cd /tmp/prod-clean/
          
          # 3. Limpiar dentro de las carpetas
          
          # --- BACKEND ---
          if [ -d "backend" ]; then
            cd backend
            rm -rf node_modules/ test/ scripts/
            rm -f .env .env.example
            rm -rf db/*.sqlite db/*.sqlite-wal db/*.sqlite-shm database.sqlite*
            find . -name "*.md" -type f -delete
            cd ..
          fi
          
          # --- FRONTEND-BUN-EJS ---
          if [ -d "frontend-bun-ejs" ]; then
            cd frontend-bun-ejs
            rm -rf node_modules/ test/ scripts/
            rm -f .env
            rm -f *.log
            find . -name "*.md" -type f -delete
            cd ..
          fi
          
          # --- SERVER ---
          if [ -d "server" ]; then
            cd server
            find . -name "*.md" -type f -delete
            cd ..
          fi
          
          # --- EXCLUSIONES BACKEND ---
          if [ -d "backend" ]; then
            cd backend
            rm -rf node_modules/
            rm -rf test/
            rm -rf db/*.sqlite db/*.sqlite-wal db/*.sqlite-shm database.sqlite database.sqlite-wal database.sqlite-shm
            rm -rf scripts/
            rm -f .env
            cd ..
          fi
          
          # --- EXCLUSIONES FRONTEND (frontend-bun-ejs) ---
          if [ -d "frontend-bun-ejs" ]; then
            cd frontend-bun-ejs
            rm -rf node_modules/
            rm -rf test/
            rm -rf scripts/
            rm -f *.log
            rm -f .env
            cd ..
          fi
          
          # --- EXCLUSIONES FRONTEND (frontend original) ---
          # Por si lo seguís usando o querés limpiarlo tambien
          if [ -d "frontend" ]; then
            cd frontend
            rm -rf node_modules/
            rm -rf test/
            rm -rf scripts/
            rm -f .env
            cd ..
          fi

      - name: Push to prod branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/prod-clean
          publish_branch: prod
          force_orphan: true
          commit_message: "🚀 Deploy limpio (bot) de main a prod"
