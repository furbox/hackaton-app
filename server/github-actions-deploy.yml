name: Deploy VPS

on:
  push:
    branches:
      - prod
    paths:
      - backend/**
      - frontend/**
      - server/**
      - .github/workflows/**
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target: backend, frontend, all"
        required: false
        default: "all"
      branch:
        description: "Branch to deploy"
        required: false
        default: "prod"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend-bun-ejs/**'
            server:
              - 'server/**'

  deploy:
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.server == 'true'
    steps:
      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ needs.changes.outputs.server }}" = "true" ]; then
            echo "value=all" >> "$GITHUB_OUTPUT"
            echo "branch=prod" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ needs.changes.outputs.backend }}" = "true" ] && [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
            echo "value=all" >> "$GITHUB_OUTPUT"
            echo "branch=prod" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
            echo "value=backend" >> "$GITHUB_OUTPUT"
            echo "branch=prod" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
            echo "value=frontend" >> "$GITHUB_OUTPUT"
            echo "branch=prod" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "value=all" >> "$GITHUB_OUTPUT"
          echo "branch=prod" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /home/urloft
            chmod +x ./server/deploy.sh
            ./server/deploy.sh "${{ steps.target.outputs.value }}" "${{ steps.target.outputs.branch }}"
